          gg.exponentialRampToValueAtTime(0.0001, now2 + burstDur);
          gg.setValueAtTime(0, now2 + burstDur + 0.001);
          // Next fire: density controls average rate (0-20 bursts per second)
          const avgInterval = 1 / (0.1 + curDensity * 20);
          const jittered = avgInterval * (0.5 + Math.random() * (1 + curRnd));
          v._crackleNextFire = now2 + jittered;
        }
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }
  }
  else if (type === 'wind') {
    const intensity = (g.intensity || 0)/100;
    safeFreq(v.windBP.frequency, g.bpCenter || 800, 0.1);
    safeSet(v.windAmp.gain, intensity * 0.6, 0.15);
    let gr = g.gustRate;
    if (g.bpmSync) {
      const n = SYNC_NOTES_GEN[g.syncNoteIdx] || '1/4';
      gr = bpmHz(NOTE_VALUES[n] || 1);
    }
    if (!isFinite(gr) || gr <= 0) gr = 0.4;
    safeFreq(v.gustLFO.frequency, Math.max(0.01, gr), 0.1);
    safeSet(v.gustGain.gain, (g.gustDepth || 0)/100 * 0.4, 0.1);
    // Turbulence affects Q
    if (v.windBP && v.windBP.Q) {
      const turb = (g.turbulence || 0)/100;
      safeSet(v.windBP.Q, 0.5 + turb * 3, 0.1);
    }
  }
  else if (type === 'pulse') {
    const pitch = g.pitch * state.pitchMult;
    safeFreq(v.osc.frequency, pitch);
    let pr = g.modFreq;
    if (g.bpmSync) {
      const n = SYNC_NOTES_GEN[g.syncNoteIdx] || '1/4';
      pr = bpmHz(NOTE_VALUES[n] || 1);
    }
    if (!isFinite(pr) || pr <= 0) pr = 1;
    safeFreq(v.pulseLFO.frequency, Math.max(0.01, pr), 0.05);
    const intensity = (g.intensity || 0)/100;
    safeSet(v.pulseAM.gain, 0.5 - intensity * 0.3, 0.05);
    safeSet(v.pulseLFOGain.gain, 0.5 * intensity + 0.1, 0.05);
  }
  else if (type === 'drone') {
    const pitch = g.pitch * state.pitchMult;
    const detune = (g.detune || 0)/100;
    if (v.oscs) {
      v.oscs.forEach((o, i) => {
        const dt = (i - 2.5) * 0.004 * (1 + detune * 4);
        safeFreq(o.osc.frequency, pitch * (1 + dt), 0.1);
      });
    }
    let mf = g.modFreq;
    if (g.bpmSync) {
      const n = SYNC_NOTES_GEN[g.syncNoteIdx] || '1/4';
      mf = bpmHz(NOTE_VALUES[n] || 1);
    }
    if (!isFinite(mf) || mf <= 0) mf = 0.15;
    safeFreq(v.droneLFO.frequency, Math.max(0.01, mf), 0.1);
    safeSet(v.droneLFOGain.gain, (g.modDepth || 0) * 0.5, 0.1);
  }
  else if (type === 'scrape') {
    const pitch = g.pitch * state.pitchMult;
    safeFreq(v.osc.frequency, pitch);
    let sr = g.sweepRate;
    if (g.bpmSync) {
      const n = SYNC_NOTES_GEN[g.syncNoteIdx] || '1/4';
      sr = bpmHz(NOTE_VALUES[n] || 1);
    }
    if (!isFinite(sr) || sr <= 0) sr = 1.5;
    safeFreq(v.scrapeLFO.frequency, Math.max(0.01, sr), 0.05);
    // Q
    if (v.scrapeBP && v.scrapeBP.Q) {
      safeSet(v.scrapeBP.Q, g.filterQ || 12, 0.05);
    }
    // Randomize affects sweep depth
    const rnd = (g.randomize || 0)/100;
    safeSet(v.scrapeLFOGain.gain, 1500 + rnd * 2500, 0.1);
  }
}

/* ---------- START / STOP ---------- */
function start() {
  initAudio();
  if (audio.state === 'suspended') audio.resume();
  running = true;
  document.getElementById('powerSwitch').classList.add('on');
  document.getElementById('lblOn').classList.add('active');
  document.getElementById('lblOff').classList.remove('active');
  document.getElementById('airVent').classList.add('vibrating');
  // Robust master gain restore: explicit setValueAtTime then linear ramp to target
  const now = audio.currentTime;
  const cur = audio.master.gain.value;
  audio.master.gain.cancelScheduledValues(now);
  audio.master.gain.setValueAtTime(cur, now);
  audio.master.gain.linearRampToValueAtTime(state.masterVol, now + 0.08);
  // push all params
  GEN_DEFS.forEach(d => updateGeneratorParams(d.key));
  updateDelayParams();
  updateReverbParams();
  // Reset trigger timers + wail state for all slots based on their type
  SLOTS.forEach(slotId => {
    const g = state.generators[slotId];
    const v = voices[slotId];
    if (!v || !g) return;
    if (g.type === 'clang' || g.type === 'rattle' || g.type === 'steam' ||
        g.type === 'drip' || g.type === 'gear' || g.type === 'bell') {
      v._nextTrigger = 0;
      v._sustainActiveUntil = 0;
    }
    if (g.type === 'ghost') {
      v._nextWailCheck = 0;
      v._wailActiveUntil = 0;
      if (v.wailSrc) {
        v.wailSrc.offset.cancelScheduledValues(audio.currentTime);
        v.wailSrc.offset.setValueAtTime(0, audio.currentTime);
      }
      if (v.wailGain) {
        v.wailGain.gain.cancelScheduledValues(audio.currentTime);
        v.wailGain.gain.setValueAtTime(1.0, audio.currentTime);
      }
    }
  });
  scheduleRetriggers();
}
function stop() {
  running = false;
  document.getElementById('powerSwitch').classList.remove('on');
  document.getElementById('lblOn').classList.remove('active');
  document.getElementById('lblOff').classList.add('active');
  document.getElementById('airVent').classList.remove('vibrating');
  if (audio) {
    const now = audio.currentTime;
    const cur = audio.master.gain.value;
    audio.master.gain.cancelScheduledValues(now);
    audio.master.gain.setValueAtTime(cur, now);
    audio.master.gain.linearRampToValueAtTime(0, now + 0.05);
  }
}
function toggle() { running ? stop() : start(); }

/* ============================================================
   UI EVENTS
   ============================================================ */
function bindPatchButtons() {
  document.getElementById('saveBtn').addEventListener('click', () => {
    const name = document.getElementById('patchName').value || 'UNTITLED';
    const recordingData = (window.__VENT_REC__ && window.__VENT_REC__.get()) || null;
    // Build slotTypes array so patch preserves which sound occupies each slot
    const slotTypes = SLOTS.map(slotId =>
      (state.generators[slotId] && state.generators[slotId].type) || 'rumble'
    );
    const data = {
      name,
      version: 2,                    // new format marker
      bpm: state.bpm,
      masterVol: state.masterVol,
      slotTypes,
      generators: state.generators,  // slot-keyed now
      delay: state.delay,
      reverb: state.reverb,
      recording: recordingData
    };
    // human-readable
    let txt = `VENT PATCH FILE\n===============\nName: ${name}\nBPM: ${state.bpm}\nMaster Volume: ${(state.masterVol*100).toFixed(0)}\n\n`;
    SLOTS.forEach((slotId, slotIdx) => {
      const g = state.generators[slotId];
      const def = SOUND_DEFS[g.type];
      txt += `[SLOT ${slotIdx+1}: ${def.label.toUpperCase()}]\n`;
      def.sliders.forEach((s, i) => {
        txt += `  ${def.labels[i]}: ${(+g[s]).toFixed(2)}\n`;
      });
      txt += `  BPM Sync: ${g.bpmSync}\n  Sync Note Index: ${g.syncNoteIdx}\n\n`;
    });
    txt += `[DELAY]\n`;
    state.delay.forEach((tp, i) => {
      txt += `  Tap ${i+1}: note=${tp.note} feedback=${tp.feedback.toFixed(0)} pan=${tp.pan.toFixed(0)} vol=${tp.vol.toFixed(0)} reverbSend=${tp.reverbSend.toFixed(0)}\n`;
    });
    txt += `\n[REVERB]\n  Mode: ${state.reverb.mode}\n  Depth: ${state.reverb.depth.toFixed(0)}\n  Size: ${state.reverb.size.toFixed(0)}ms\n  Mod: ${state.reverb.mod.toFixed(2)}Hz\n  Mod Depth: ${state.reverb.modDepth.toFixed(0)}\n  Volume: ${state.reverb.vol.toFixed(0)}\n`;
    if (recordingData && recordingData.takes && recordingData.takes.length) {
      const numEvents = recordingData.takes.reduce((sum, t) => sum + (t.events ? t.events.length : 0), 0);
      txt += `\n[RECORDING]\n  Takes: ${recordingData.takes.length}\n  Total Events: ${numEvents}\n`;
    }
    txt += `\n<<JSON>>\n${JSON.stringify(data)}\n<<END>>\n`;

    const blob = new Blob([txt], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name.replace(/[^a-z0-9_-]/gi,'_') + '.vent.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  document.getElementById('loadBtn').addEventListener('click', () => {
    document.getElementById('loadInput').click();
  });
  document.getElementById('loadInput').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      const txt = ev.target.result;
      const m = txt.match(/<<JSON>>\n([\s\S]*?)\n<<END>>/);
      if (!m) { alert('Invalid VENT patch file.'); return; }
      try {
        const data = JSON.parse(m[1]);
        applyPatchData(data);
      } catch (err) { alert('Failed to parse patch: '+err.message); }
    };
    r.readAsText(f);
  });

  // ============================================================
  // RECORD / PLAY / UNDO / CLEAR
  // ============================================================
  //
  // Design:
  // - On first REC, take a "baseline" snapshot of every slider/control. This is the
  //   state the system returns to when recording stops or before playback begins.
  // - A "take" is a compact array of events since recording started, each event being
  //   a 3- or 4-element array (not an object) for minimum size: [t, code, key, value]
  // - `t` is milliseconds from recording start (rounded to integer = much smaller serialization)
  // - `code` is a small integer event-type code
  // - `key` is an index into a control-table OR a selector string
  // - Sliders/dropdowns use a numeric index into CONTROL_MAP for maximum efficiency.
  //
  // REC behavior:
  // - Pressing REC starts a new take AND starts playback from the beginning (so you
  //   hear existing takes while overdubbing), and turns audio on if off
  // - Pressing REC again stops BOTH recording and playback, and reverts to baseline
  // - REC always applies baseline state first (like loading a preset)
  //
  // PLAY behavior:
  // - Always starts from baseline state, then dispatches all events from all takes
  // - Turns audio on if off
  // - Pressing PLAY again stops playback and reverts to baseline

  const MAX_REC_MS = 5 * 60 * 1000;

  // Build a stable map of "recordable" controls once, so events can use small indices.
  // This is built lazily on first REC since some DOM elements may not exist yet.
  let CONTROL_MAP = null; // index -> {selector, el, kind: 'slider'|'select'|'checkbox'}
  let CONTROL_INDEX = null; // selectorString -> index
  function buildControlMap() {
    CONTROL_MAP = [];
    CONTROL_INDEX = {};
    const addCtrl = (selector, kind) => {
      const el = document.querySelector(selector);
      if (!el) return;
      CONTROL_INDEX[selector] = CONTROL_MAP.length;
      CONTROL_MAP.push({ selector, el, kind });
    };
    // Generator sliders and sync controls (keyed by slot ID, fields resolved from current type)
    SLOTS.forEach(slotId => {
      const g = state.generators[slotId];
      if (!g) return;
      const def = SOUND_DEFS[g.type];
      if (!def) return;
      def.sliders.forEach(s => {
        addCtrl(`input[data-gen="${slotId}"][data-field="${s}"]`, 'slider');
      });
      addCtrl(`input[type=checkbox][data-gen="${slotId}"]`, 'checkbox');
      addCtrl(`select.sync-select[data-gen="${slotId}"]`, 'select');
    });
    // Delay taps
    for (let i=0; i<4; i++) {
      addCtrl(`select[data-tap="${i}"][data-field="note"]`, 'select');
      ['feedback','pan','vol','reverbSend'].forEach(f =>
        addCtrl(`input[data-tap="${i}"][data-field="${f}"]`, 'slider'));
    }
    // Reverb
    ['depth','size','mod','modDepth','vol'].forEach(k =>
      addCtrl(`input[data-verb="${k}"]`, 'slider'));
    addCtrl(`#verbMode`, 'select');
    // BPM
    addCtrl(`#bpm`, 'bpm');
  }
  // Expose globally so swapSlotType can rebuild after DOM changes
  window.__VENT_REBUILD_CONTROL_MAP__ = buildControlMap;

  // Event codes (small numbers = compact JSON serialization)
  const EV_SLIDER = 1, EV_SELECT = 2, EV_CHECKBOX = 3, EV_BPM = 4,
        EV_RIBBON = 5, EV_MASTER = 6, EV_PRESET = 7, EV_DEFAULT = 8;

  const rec = {
    takes: [],           // array of takes, each take = { events, dur }
    baseline: null,      // snapshot of all control state, or null if never recorded
    currentTake: null,   // {events, startMs}
    isPlaying: false,
    playbackTimers: [],
    // recording sampler state
    lastRibbonMult: 1,
    lastMasterVol: state.masterVol,
    _ribbonFadeTimer: null
  };

  // Record a slider/control's value when the user changes it
  function recordEvent(arr) {
    if (!rec.currentTake) return;
    const t = Math.round(performance.now() - rec.currentTake.startMs);
    if (t > MAX_REC_MS) { stopRecAndPlay(true); return; }
    // arr is [code, key, value] — prepend t → [t, code, key, value]
    rec.currentTake.events.push([t, ...arr]);
  }

  // Take a snapshot of all controls + state for baseline / save
  function snapshotState() {
    if (!CONTROL_MAP) buildControlMap();
    const controls = [];
    CONTROL_MAP.forEach((c, i) => {
      let v;
      if (c.kind === 'checkbox') v = c.el.checked ? 1 : 0;
      else v = c.el.value;
      controls.push(v);
    });
    return {
      controls,
      pitchMult: state.pitchMult,
      masterVol: state.masterVol
    };
  }

  // Apply a snapshot back to the UI, triggering the normal input/change handlers
  // so that all audio state updates properly.
  function applySnapshot(snap) {
    if (!snap || !CONTROL_MAP) return;
    snap.controls.forEach((v, i) => {
      const c = CONTROL_MAP[i];
      if (!c) return;
      if (c.kind === 'checkbox') {
        c.el.checked = !!v;
        c.el.dispatchEvent(new Event('change', { bubbles: true }));
      } else if (c.kind === 'select' || c.kind === 'bpm') {
        c.el.value = v;
        c.el.dispatchEvent(new Event('change', { bubbles: true }));
      } else {
        c.el.value = v;
        c.el.dispatchEvent(new Event('input', { bubbles: true }));
      }
    });
    // Ribbon
    if (typeof snap.pitchMult === 'number') {
      state.pitchMult = snap.pitchMult;
      const rCursor = document.getElementById('ribbonCursor');
      if (rCursor) {
        const semis = 12 * Math.log2(snap.pitchMult || 1);
        const pct = Math.max(0, Math.min(1, semis / 36 + 0.5));
        rCursor.style.left = (pct * 100) + '%';
      }
      if (audio) GEN_DEFS.forEach(d => updateGeneratorParams(d.key));
    }
    // Master volume
    if (typeof snap.masterVol === 'number') {
      state.masterVol = snap.masterVol;
      setKnobRot();
      if (audio && running) {
        audio.master.gain.setTargetAtTime(state.masterVol, audio.currentTime, 0.03);
      }
    }
  }

  // Event capture: attached to the whole app, catches control changes during recording
  const app = document.getElementById('app');
  app.addEventListener('input', (e) => {
    if (!rec.currentTake) return;
    const el = e.target;
    if (el.tagName !== 'INPUT' || el.type !== 'range') {
      if (el.id === 'bpm') recordEvent([EV_BPM, 0, parseInt(el.value)]);
      return;
    }
    const selector = selectorFor(el);
    const idx = CONTROL_INDEX[selector];
    if (idx !== undefined) {
      recordEvent([EV_SLIDER, idx, parseFloat(el.value)]);
    }
  }, true);
  app.addEventListener('change', (e) => {
    if (!rec.currentTake) return;
    const el = e.target;
    if (el.tagName === 'SELECT') {
      if (el.id === 'presetSelect') {
        const filename = el.value;
        if (filename) recordEvent([EV_PRESET, 0, filename]);
        return;
      }
      const selector = selectorFor(el);
      const idx = CONTROL_INDEX[selector];
      if (idx !== undefined) recordEvent([EV_SELECT, idx, el.value]);
    } else if (el.tagName === 'INPUT' && el.type === 'checkbox') {
      const selector = selectorFor(el);
      const idx = CONTROL_INDEX[selector];
      if (idx !== undefined) recordEvent([EV_CHECKBOX, idx, el.checked ? 1 : 0]);
    } else if (el.id === 'bpm') {
      recordEvent([EV_BPM, 0, parseInt(el.value)]);
    }
  }, true);

  function selectorFor(el) {
    if (el.dataset.gen !== undefined && el.dataset.field !== undefined) {
      const sel = el.tagName === 'SELECT' ? 'select' : 'input';
      if (el.tagName === 'SELECT') return `select.sync-select[data-gen="${el.dataset.gen}"]`;
      if (el.type === 'checkbox') return `input[type=checkbox][data-gen="${el.dataset.gen}"]`;
      return `input[data-gen="${el.dataset.gen}"][data-field="${el.dataset.field}"]`;
    }
    if (el.dataset.tap !== undefined && el.dataset.field !== undefined) {
      const sel = el.tagName === 'SELECT' ? 'select' : 'input';
      return `${sel}[data-tap="${el.dataset.tap}"][data-field="${el.dataset.field}"]`;
    }
    if (el.dataset.verb !== undefined) return `input[data-verb="${el.dataset.verb}"]`;
    if (el.id) return `#${el.id}`;
    return null;
  }

  // Continuous sampler for ribbon + master knob
  function recordingSampler() {
    if (!rec.currentTake) return;
    if (Math.abs(state.pitchMult - rec.lastRibbonMult) > 0.001) {
      rec.lastRibbonMult = state.pitchMult;
      recordEvent([EV_RIBBON, 0, Math.round(state.pitchMult * 10000) / 10000]);
    }
    if (Math.abs(state.masterVol - rec.lastMasterVol) > 0.002) {
      rec.lastMasterVol = state.masterVol;
      recordEvent([EV_MASTER, 0, Math.round(state.masterVol * 1000) / 1000]);
    }
    requestAnimationFrame(recordingSampler);
  }

  // ---- Start / Stop recording + playback ----
  // Enable/disable PLAY, UNDO, CLEAR based on whether takes exist.
  // REC stays active always.
  function updateMotionButtonState() {
    const hasContent = rec.takes.length > 0;
    ['playBtn','undoBtn','clearBtn'].forEach(id => {
      const btn = document.getElementById(id);
      if (!btn) return;
      if (hasContent) btn.classList.remove('disabled');
      else btn.classList.add('disabled');
    });
  }

  function startRecAndPlay() {
    if (!CONTROL_MAP) buildControlMap();
    // Always stop any in-progress playback/recording cleanly first
    stopPlaybackOnly();
    if (rec.currentTake) { // already recording — shouldn't happen, but guard
      rec.takes.push({ events: rec.currentTake.events, dur: performance.now() - rec.currentTake.startMs });
      rec.currentTake = null;
    }

    // Take a baseline snapshot ONLY on the very first REC (when no takes exist yet).
    // All subsequent takes share the same baseline, so PLAY always starts from the same place.
    if (!rec.baseline) {
      rec.baseline = snapshotState();
    } else {
      // On subsequent REC presses, revert to baseline first so recording starts from the
      // consistent "home" state that PLAY will also use.
      applySnapshot(rec.baseline);
    }

    // Turn on audio if off
    if (!running) start();

    // Begin playback of existing takes from start (so the user hears the layered takes)
    beginPlayback(() => {
      // When playback ends naturally, stop playback UI state but keep recording going
      rec.isPlaying = false;
      document.getElementById('playBtn').classList.remove('playing');
    });

    // Start a new take
    rec.currentTake = { events: [], startMs: performance.now() };
    rec.lastRibbonMult = state.pitchMult;
    rec.lastMasterVol = state.masterVol;
    document.getElementById('recBtn').classList.add('armed');
    document.getElementById('playBtn').classList.add('playing');
    requestAnimationFrame(recordingSampler);
  }

  function stopRecAndPlay(reverToBaseline) {
    // Finalize any recording in progress
    if (rec.currentTake) {
      if (rec.currentTake.events.length > 0) {
        const dur = performance.now() - rec.currentTake.startMs;
        rec.takes.push({ events: rec.currentTake.events, dur });
      }
      rec.currentTake = null;
      document.getElementById('recBtn').classList.remove('armed');
    }
    stopPlaybackOnly();
    if (reverToBaseline && rec.baseline) {
      applySnapshot(rec.baseline);
    }
    updateMotionButtonState();
  }

  // Internal: cancel any scheduled playback timers + UI state, no baseline revert
  function stopPlaybackOnly() {
    rec.playbackTimers.forEach(clearTimeout);
    rec.playbackTimers = [];
    rec.isPlaying = false;
    document.getElementById('playBtn').classList.remove('playing');
    const ribbon = document.getElementById('ribbon');
    if (ribbon) ribbon.classList.remove('active');
    stopProgressBar();
  }

  // ---- Playback progress bar ----
  function startProgressBar(totalMs) {
    const fill = document.getElementById('motionProgressFill');
    if (!fill) return;
    rec._progressStart = performance.now();
    rec._progressTotal = Math.max(1, totalMs);
    fill.classList.add('active');
    fill.style.width = '0%';
    const tick = () => {
      if (!rec.isPlaying && !rec._recProgressActive) return;
      const elapsed = performance.now() - rec._progressStart;
      const pct = Math.max(0, Math.min(100, (elapsed / rec._progressTotal) * 100));
      fill.style.width = pct + '%';
      if (elapsed < rec._progressTotal) {
        rec._progressRAF = requestAnimationFrame(tick);
      }
    };
    rec._progressRAF = requestAnimationFrame(tick);
  }
  function stopProgressBar() {
    if (rec._progressRAF) { cancelAnimationFrame(rec._progressRAF); rec._progressRAF = null; }
    const fill = document.getElementById('motionProgressFill');
    if (fill) {
      fill.classList.remove('active');
      fill.style.width = '0%';
    }
    rec._recProgressActive = false;
  }

  // Schedule all events from all takes; optional onEnd callback when last event fires
  function beginPlayback(onEnd) {
    if (rec.takes.length === 0) { if (onEnd) onEnd(); return; }

    // Flatten all takes (each take's events start at 0, absolute time = event's t)
    const allEvents = [];
    rec.takes.forEach(take => take.events.forEach(ev => allEvents.push(ev)));
    allEvents.sort((a, b) => a[0] - b[0]);
    if (allEvents.length === 0) { if (onEnd) onEnd(); return; }

    const lastT = allEvents[allEvents.length - 1][0];
    rec.isPlaying = true;
    rec.playbackTimers = allEvents.map(ev =>
      setTimeout(() => dispatchRecEvent(ev), ev[0])
    );
    rec.playbackTimers.push(setTimeout(() => {
      if (onEnd) onEnd();
    }, lastT + 200));
    // Start the progress bar
    startProgressBar(lastT + 200);
  }

  // ---- PLAY only ----
  function startPlaybackOnly() {
    if (!CONTROL_MAP) buildControlMap();
    if (rec.takes.length === 0) return;
    if (rec.isPlaying) { stopRecAndPlay(true); return; }
    // Stop any in-progress recording cleanly
    if (rec.currentTake) {
      if (rec.currentTake.events.length > 0) {
        const dur = performance.now() - rec.currentTake.startMs;
        rec.takes.push({ events: rec.currentTake.events, dur });
      }
      rec.currentTake = null;
      document.getElementById('recBtn').classList.remove('armed');
    }
    // Turn on audio if off
    if (!running) start();
    // Always apply baseline first if we have one
    if (rec.baseline) applySnapshot(rec.baseline);
    document.getElementById('playBtn').classList.add('playing');
    beginPlayback(() => {
      stopPlaybackOnly();
      // When playback ends naturally, revert to baseline so sliders return home
      if (rec.baseline) applySnapshot(rec.baseline);
    });
  }

  // Dispatch one recorded event
  function dispatchRecEvent(ev) {
    const [t, code, key, value] = ev;
    switch (code) {
      case EV_SLIDER: {
        const c = CONTROL_MAP[key]; if (!c) return;
        c.el.value = value;
        c.el.dispatchEvent(new Event('input', { bubbles: true }));
        break;
      }
      case EV_SELECT: {
        const c = CONTROL_MAP[key]; if (!c) return;
        c.el.value = value;
        c.el.dispatchEvent(new Event('change', { bubbles: true }));
        break;
      }
      case EV_CHECKBOX: {
        const c = CONTROL_MAP[key]; if (!c) return;
        c.el.checked = !!value;
        c.el.dispatchEvent(new Event('change', { bubbles: true }));
        break;
      }
      case EV_BPM: {
        const el = document.getElementById('bpm');
        if (el) { el.value = value; el.dispatchEvent(new Event('change', { bubbles: true })); }
        break;
      }
      case EV_RIBBON: {
        state.pitchMult = value;
        const rCursor = document.getElementById('ribbonCursor');
        const ribbon = document.getElementById('ribbon');
        if (rCursor && ribbon) {
          const semis = 12 * Math.log2(value || 1);
          const pct = Math.max(0, Math.min(1, semis / 36 + 0.5));
          rCursor.style.left = (pct * 100) + '%';
          ribbon.classList.add('active');
          clearTimeout(rec._ribbonFadeTimer);
          rec._ribbonFadeTimer = setTimeout(() => ribbon.classList.remove('active'), 400);
        }
        if (audio) GEN_DEFS.forEach(d => updateGeneratorParams(d.key));
        break;
      }
      case EV_MASTER: {
        state.masterVol = value;
        setKnobRot();
        if (audio && running) audio.master.gain.setTargetAtTime(state.masterVol, audio.currentTime, 0.03);
        break;
      }
      case EV_PRESET: {
        if (typeof value === 'string' && PRESET_FILES.includes(value)) {
          const sel = document.getElementById('presetSelect');
          if (sel) sel.value = value;
          loadPresetFromFile(value);
        }
        break;
      }
      case EV_DEFAULT: {
        loadPreset(buildDefaultPatch());
        break;
      }
    }
  }

  function undoLastTake() {
    if (rec.currentTake) stopRecAndPlay(true);
    else if (rec.isPlaying) stopRecAndPlay(true);
    if (rec.takes.length > 0) {
      rec.takes.pop();
      flashButton('undoBtn');
      // If no takes remain, clear baseline too (next REC takes a fresh snapshot)
      if (rec.takes.length === 0) rec.baseline = null;
    }
    updateMotionButtonState();
  }
  function clearAllTakes() {
    stopRecAndPlay(true);
    rec.takes = [];
    rec.baseline = null;
    flashButton('clearBtn');
    updateMotionButtonState();
  }
  function flashButton(id) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 200);
  }

  document.getElementById('recBtn').addEventListener('click', (e) => {
    e.currentTarget.blur();
    if (rec.currentTake) {
      // Stop recording + playback, revert to baseline
      stopRecAndPlay(true);
    } else {
      startRecAndPlay();
      // REC activates PLAY/UNDO/CLEAR (we now have an in-progress recording)
      updateMotionButtonState();
      // While recording, un-grey UNDO/CLEAR/PLAY even if takes is still empty
      ['playBtn','undoBtn','clearBtn'].forEach(id => {
        document.getElementById(id).classList.remove('disabled');
      });
    }
  });
  document.getElementById('playBtn').addEventListener('click', (e) => {
    e.currentTarget.blur();
    if (e.currentTarget.classList.contains('disabled')) return;
    if (rec.isPlaying || rec.currentTake) {
      stopRecAndPlay(true);
    } else {
      startPlaybackOnly();
    }
  });
  document.getElementById('undoBtn').addEventListener('click', (e) => {
    e.currentTarget.blur();
    if (e.currentTarget.classList.contains('disabled')) return;
    undoLastTake();
  });
  document.getElementById('clearBtn').addEventListener('click', (e) => {
    e.currentTarget.blur();
    if (e.currentTarget.classList.contains('disabled')) return;
    clearAllTakes();
  });

  // Expose rec state + apply helpers so save/load can include recordings in patches
  window.__VENT_REC__ = {
    get: () => ({
      takes: rec.takes.map(t => ({ events: t.events, dur: t.dur })),
      baseline: rec.baseline
    }),
    set: (data) => {
      if (!data) return;
      rec.takes = (data.takes || []).map(t => ({ events: t.events || [], dur: t.dur || 0 }));
      rec.baseline = data.baseline || null;
      updateMotionButtonState();
    }
  };

  // Initialize motion button state on page load
  updateMotionButtonState();

  // Default button: reset all sliders and effects to factory defaults
  document.getElementById('defaultBtn').addEventListener('click', () => {
    if (rec.currentTake) recordEvent([EV_DEFAULT, 0, 0]);
    const def = buildDefaultPatch();
    loadPreset(def);
    document.getElementById('presetSelect').value = '';
  });
}

function buildDefaultPatch() {
  const patch = { name: 'INIT PATCH', slotTypes: [...DEFAULT_SLOT_TYPES], generators: {}, delay: [], reverb: {} };
  SLOTS.forEach((slotId, i) => {
    const type = DEFAULT_SLOT_TYPES[i];
    const def = SOUND_DEFS[type];
    const g = { type, bpmSync: false, syncNoteIdx: 7 };
    def.sliders.forEach((s, idx) => { g[s] = def.ranges[idx][2]; });
    patch.generators[slotId] = g;
  });
  patch.delay = [
    { note: '1/4',  feedback: 30, pan: -60, vol: 40, reverbSend: 20 },
    { note: '1/8',  feedback: 25, pan: 60,  vol: 30, reverbSend: 20 },
    { note: 'd1/8', feedback: 20, pan: -30, vol: 25, reverbSend: 20 },
    { note: '1/16', feedback: 15, pan: 30,  vol: 20, reverbSend: 20 }
  ];
  patch.reverb = { mode: 'warehouse', depth: 50, size: 2000, mod: 0.5, modDepth: 20, vol: 50 };
  return patch;
}

/* BPM */
document.addEventListener('DOMContentLoaded', () => {
  buildSoundControl();
  buildEffects();
  buildPresetList();
  bindPatchButtons();
  setKnobRot();

  // Initialize sync swap visibility based on default state
  GEN_DEFS.forEach(d => applySyncVisibility(d.key));

  const bpmInp = document.getElementById('bpm');
  bpmInp.addEventListener('change', () => {
    let v = parseInt(bpmInp.value);
    if (isNaN(v)) v = 90;
    v = Math.max(10, Math.min(300, v));
    bpmInp.value = v;
    state.bpm = v;
    if (audio) { updateDelayParams(); GEN_DEFS.forEach(d=>updateGeneratorParams(d.key)); }
  });
  bpmInp.addEventListener('click', () => bpmInp.select());

  // Power switch
  document.getElementById('powerSwitch').addEventListener('click', toggle);

  // Spacebar — toggles power regardless of focus, unless user is actively typing in a text field.
  window.addEventListener('keydown', e => {
    if (e.code !== 'Space') return;
    const ae = document.activeElement;
    // Only ignore when user is typing into a text/number field or textarea
    const isTextInput = ae && (
      (ae.tagName === 'INPUT' && (ae.type === 'text' || ae.type === 'number' || ae.type === 'search' || ae.type === 'email' || ae.type === 'password' || ae.type === 'url')) ||
      ae.tagName === 'TEXTAREA' ||
      ae.isContentEditable
    );
    if (isTextInput) return;
    // For all other focused elements (slider, checkbox, button, select), blur them so
    // the spacebar doesn't trigger their native activation, then toggle.
    if (ae && ae !== document.body && typeof ae.blur === 'function') ae.blur();
    e.preventDefault();
    toggle();
  });

  // Ribbon
  const ribbon = document.getElementById('ribbon');
  const rCursor = document.getElementById('ribbonCursor');
  let ribbonActive = false;
  const ribbonMove = (e) => {
    const rect = ribbon.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const pct = Math.max(0, Math.min(1, x / rect.width));
    rCursor.style.left = (pct * 100) + '%';
    // 3 octave range total (-1.5 to +1.5 octaves)
    const semis = (pct - 0.5) * 36;
    state.pitchMult = Math.pow(2, semis/12);
    if (audio) GEN_DEFS.forEach(d => updateGeneratorParams(d.key));
  };
  const startRibbon = (e) => { ribbonActive = true; ribbon.classList.add('active'); ribbonMove(e); };
  const endRibbon = () => {
    ribbonActive = false;
    ribbon.classList.remove('active');
    // spring back to center
    state.pitchMult = 1;
    if (audio) GEN_DEFS.forEach(d => updateGeneratorParams(d.key));
  };
  ribbon.addEventListener('mousedown', startRibbon);
  window.addEventListener('mousemove', e => { if (ribbonActive) ribbonMove(e); });
  window.addEventListener('mouseup', () => { if (ribbonActive) endRibbon(); });
  ribbon.addEventListener('touchstart', startRibbon, {passive:true});
  ribbon.addEventListener('touchmove', e => { if (ribbonActive) ribbonMove(e); }, {passive:true});
  ribbon.addEventListener('touchend', endRibbon);

  // Master knob (drag vertically)
  const mk = document.getElementById('masterKnob');
  let knobDrag = false, knobStartY = 0, knobStartVal = 0;
  mk.addEventListener('mousedown', e => { knobDrag = true; knobStartY = e.clientY; knobStartVal = state.masterVol; e.preventDefault(); });
  window.addEventListener('mousemove', e => {
    if (!knobDrag) return;
    const delta = (knobStartY - e.clientY) / 200;
    state.masterVol = Math.max(0, Math.min(1, knobStartVal + delta));
    setKnobRot();
    if (audio && running) audio.master.gain.setTargetAtTime(state.masterVol, audio.currentTime, 0.03);
  });
  window.addEventListener('mouseup', () => knobDrag = false);
  mk.addEventListener('wheel', e => {
    e.preventDefault();
    state.masterVol = Math.max(0, Math.min(1, state.masterVol - e.deltaY*0.001));
    setKnobRot();
    if (audio && running) audio.master.gain.setTargetAtTime(state.masterVol, audio.currentTime, 0.03);
  }, {passive:false});
});

function setKnobRot() {
  const deg = -135 + state.masterVol * 270;
  document.getElementById('masterKnob').style.setProperty('--knob-rot', deg + 'deg');
  document.getElementById('masterKnob').querySelector ? null : null;
  const knob = document.getElementById('masterKnob');
  knob.style.transform = '';
  // Rotate the indicator via pseudo-element trick with CSS variable
  knob.style.setProperty('--rot', deg + 'deg');
}
// Rotate knob indicator via stylesheet
const knobStyle = document.createElement('style');
knobStyle.textContent = `.master-knob::after { transform: translateX(-50%) rotate(var(--rot, -135deg)); transform-origin: 50% 37px; }`;
document.head.appendChild(knobStyle);

</script>
</body>
</html>
